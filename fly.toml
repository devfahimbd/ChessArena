app = "chess-arena"
primary_region = "sin"

[build]
  dockerfile = "server/Dockerfile"

[env]
  PORT = "8080"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.ports.http_options]
    response_timeout_ms = 0

[deploy]
  strategy = "immediate"

[scaling]
  auto_stop_machines = false
  min_machines_running = 1
